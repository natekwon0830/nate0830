<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>natekwon0830 | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Do+Hyeon&display=swap" rel="stylesheet">

    <style>
        /* 1. 기본 설정 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            height: 100%;
            font-family: 'Montserrat', 'Do Hyeon', sans-serif;
            scroll-behavior: smooth;
        }

        /* 2. 스크롤 스냅 부모 컨테이너 */
        .container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* 세로 스냅 강제 */
        }

        /* 3. 각 섹션 공통 스타일 */
        section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start; /* 섹션 시작점에 스냅 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* 4. 섹션별 디자인 (피그마 배경 등을 넣을 곳) */
        .hero { 
            background-image: url(website/images/Desktop.png);
            background-size: cover;
            background-position: center;
            letter-spacing: 1px;
            position: relative; /* 부모: 이 구역을 기준점으로 잡습니다 */
            width: 100%;
            height: 100vh;
            color: #000;
        }

        .video-section { 
            background-color: #ffffff; 
        }

        /* 5. 유튜브 영상 반응형 박스 */
        .video-wrapper {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16 / 9; /* 비율 유지 */
            margin-top: 20px;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border-radius: 10px; /* 테두리 둥글게 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .main-title {
            position: absolute;
            top: 50px;          /* 위에서 50px만큼 떨어짐 */
            left: 50px;         /* 왼쪽에서 50px만큼 떨어짐 */
            font-size: 4rem;    /* 크기는 그대로 유지 */
            color: black;       /* 글자색 */
            margin: 0;          /* h1 기본 여백 제거 */
        }
        .sub-title {
            position: absolute;
            top: 200px;
            left : 50px;
            font-size: 3rem;
            color: black;
            margin: 0;
        }
        .massengers-box {
            background-color: rgb(216, 216, 216);
            margin-top: 20px;
            width: 500px;
            border-radius: 15px;
            height: 300px;
            display: flex;          /* 1. Flex 박스로 설정 */
            flex-direction: column; /* 2. 위아래로 쌓이게 설정 (줄바꿈 <br> 효과 유지) */
            justify-content: center;/* 3. 세로 기준 중앙 정렬 */
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .video-grid{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 20px; 
           width: 90%;
           max-width: 1500px; /* 전체 너비 제한 */
           margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="hero">
          <h1 class="main-title">Hello world!</h1>
          <h2 class="sub-title"> 권도현의 개인 사이트입니다. </h2>
        </section>

        <section class="video-section">
            <h2 style="color: #333; margin-bottom: 20px;">Favorite Musics</h2>
    
            <div class="video-grid">
             <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/iGWKNrtbF9I"></iframe></div>
             <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/DIPxnt5vnhU"></iframe></div>
             <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/uKjQeuCpHM0"></iframe></div>
             <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/0_M2JX-Olv8"></iframe></div>
             <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/UYRbq_2UbFw"></iframe></div>
             <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/4JkIs37a2JE"></iframe></div>
            </div>
        </section>

        <section class="massengers">
            <h1 style="color: black;">Massengers</h1>
            <div class="massengers-box"> Instagram : <a href="https://www.instagram.com/natekwon_0830/" target="_blank" style="color: black;">@natekwon_0830</a><br>Steam : <a href="https://steamcommunity.com/profiles/76561199581870680/" target="_blank" style="color: #000;">nate0830</a></div>
        </section>

    </div>

</body>
</html>
